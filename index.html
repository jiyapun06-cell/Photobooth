<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coquette Photo Booth</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffb3d9, #c3c4e8, #ffe6f7);
            background-size: 300% 300%;
            animation: gradient 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 15px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 2.5rem;
            color: #d06f8b;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 30px;
            letter-spacing: 2px;
            font-family: 'Cursive', sans-serif;
        }

        button {
            background-color: #ff6cb3;
            color: white;
            font-size: 1.4rem;
            padding: 12px 30px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            font-family: 'Poppins', sans-serif;
            margin: 10px;
        }

        button:hover {
            background-color: #ff4c8b;
            transform: scale(1.1);
        }

        .camera {
            display: block;
            margin: 20px auto;
            border-radius: 15px;
            border: 5px solid #ffe6f7;
        }

        .preview-container {
            margin-top: 20px;
        }

        .preview-img {
            width: 250px;
            height: auto;
            border-radius: 15px;
            border: 4px solid #ffe6f7;
        }

        .hidden {
            display: none;
        }

        .message {
            font-size: 1.2rem;
            color: #ff6cb3;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Coquette Photo Booth</h1>
    <button id="startButton">Start Camera</button>
    <video id="video" class="camera hidden" width="320" height="240" autoplay></video>
    <canvas id="canvas" class="hidden" width="320" height="240"></canvas>
    <div class="preview-container hidden">
        <h2>Your Snap!</h2>
        <img id="photo" class="preview-img" src="" alt="Your Photo">
    </div>
    <button id="snapButton" class="hidden">Take Photo</button>
    <p id="message" class="message">Welcome to your Coquette experience! 💕</p>
</div>

<script>
    const startButton = document.getElementById("startButton");
    const snapButton = document.getElementById("snapButton");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const photo = document.getElementById("photo");
    const message = document.getElementById("message");
    const previewContainer = document.querySelector(".preview-container");

    const constraints = {
        video: { facingMode: "user" }
    };

    let streaming = false;

    // Start camera
    startButton.addEventListener('click', function () {
        if (!streaming) {
            startButton.classList.add('hidden');
            message.textContent = "Pose for the perfect shot!";
            navigator.mediaDevices.getUserMedia(constraints)
            .then(function (stream) {
                    video.srcObject = stream;
                    streaming = true;
                    video.classList.remove('hidden');
                    snapButton.classList.remove('hidden');
                })
                .catch(function (err) {
                    message.textContent = "Oops! Error: " + err.message;
                });
        }
    });

    // Take a snapshot
    snapButton.addEventListener('click', function () {
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const data = canvas.toDataURL('image/png');
        photo.setAttribute('src', data);
        previewContainer.classList.remove('hidden');
        message.textContent = "Here's your adorable snap! 💖";
        snapButton.classList.add('hidden');
    });
</script>

</body>
</html>
